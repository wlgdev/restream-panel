user www-data;
worker_processes 1;

pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

# stunnel 19351 - Twitch Stockholm
# stunnel 19352 - Twitch Frankfurt
# stunnel 19353 - Twitch Paris

        # Twitch Stockholm
        application twitch_stockholm {
            live on;
            record off;

            push rtmp://127.0.0.1:19351/app;
        }

        # Twitch Frankfurt
        application twitch_frankfurt {
            live on;
            record off;

            push rtmp://127.0.0.1:19352/app;
        }

        # Twitch Paris
        application twitch_paris {
            live on;
            record off;

            push rtmp://127.0.0.1:19353/app;
        }

        # Vk
        application vk {
            live on;
            record off;

            push rtmp://vsu.mycdn.me/input;
        }

        # Youtube
        application youtube {
            live on;
            record off;

            push rtmp://a.rtmp.youtube.com/live2;
        }

        application qwf {
            live on;
            record off;

            push rtmp://127.0.0.1:19351/app/qwfqwf;
            push rtmp://127.0.0.1:19352/app/qwfqwf;
        }

    }
}

stream {
    server {
        listen 1936;

        proxy_pass 127.0.0.1:19360;

        proxy_connect_timeout 5s;
        proxy_timeout 15s;
    }
}